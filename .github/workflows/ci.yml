name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # --legacy-peer-deps: Expo SDK 57 / React Native 0.86 are newer than jest-expo's
      # published peer dependency range, which pins @react-native/jest-preset to ^0.85.0.
      # Safe to drop once jest-expo publishes a release that supports RN 0.86.
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test
